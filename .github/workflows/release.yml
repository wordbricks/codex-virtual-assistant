name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go test ./...
      - uses: actions/setup-node@v6
        with:
          node-version: 20.19.0
      - run: node --check npm/bin/cva.js
      - run: node --check npm/lib/install.js
      - run: node --check npm/lib/platform.js
      - run: node --test npm/lib/install.test.js
      - run: npm pack --dry-run
        working-directory: npm

  build-cva-binaries:
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
            asset_name: cva-darwin-x64
          - goos: darwin
            goarch: arm64
            asset_name: cva-darwin-arm64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
          VERSION: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
        run: |
          mkdir -p dist
          SHORT_COMMIT="$(printf '%.7s' "$COMMIT")"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          VERSION_NO_V="${VERSION#v}"
          go build \
            -trimpath \
            -ldflags="-s -w -X main.version=${VERSION_NO_V} -X main.commit=${SHORT_COMMIT} -X main.buildDate=${BUILD_DATE}" \
            -o "dist/${{ matrix.asset_name }}" \
            ./cmd/cva
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}

  build-agent-browser-binaries:
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
            asset_name: agent-browser-darwin-x64
          - goos: darwin
            goarch: arm64
            asset_name: agent-browser-darwin-arm64
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ref/agent-browser
          path: ref/agent-browser
      - uses: actions/setup-go@v6
        with:
          go-version-file: ref/agent-browser/go.mod
      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          go build \
            -trimpath \
            -ldflags="-s -w" \
            -o "dist/${{ matrix.asset_name }}" \
            ./cmd/agent-browser
        working-directory: ref/agent-browser
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset_name }}
          path: ref/agent-browser/dist/${{ matrix.asset_name }}

  create-release:
    needs:
      - build-cva-binaries
      - build-agent-browser-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
      - name: Flatten artifacts
        run: |
          mkdir -p release
          find dist -maxdepth 2 -type f -exec cp {} release/ \;
      - uses: softprops/action-gh-release@v3
        with:
          files: release/*

  publish-npm:
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Publish npm package
        working-directory: npm
        run: npm publish --access public
